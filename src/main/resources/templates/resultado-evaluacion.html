<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resultado</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="card shadow mx-auto" style="max-width:700px">

        <div class="card-body">

            <h2 class="text-center text-success mb-4">
                Evaluación Completa
            </h2>

            <div class="alert alert-success">

                <h4>
                    Nivel
                    <span th:text="${resultado.nivelAsignado}"></span>
                </h4>

                <h3>
                    S/
                    <span th:text="${resultado.montoAprobado}"></span>
                </h3>

            </div>

            <h5>Modalidad</h5>

            <p th:text="${resultado.modalidad}"></p>

            <h5>Explicación IA</h5>

            <p th:text="${resultado.explicacionIA}"></p>

            <h5>Recomendación</h5>

            <p th:text="${resultado.recomendacionIA}"></p>

            <a href="/credito/pin"
               class="btn btn-success w-100">
                Continuar
            </a>

        </div>

    </div>

</div>

</body>
</html>
