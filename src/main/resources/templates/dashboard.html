<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CrediProgreso</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <h1 class="mb-4 text-center">CrediProgreso</h1>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Nivel Actual</h5>
                    <h2 class="text-success">Nivel 1</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Crédito Disponible</h5>
                    <h2 class="text-primary">S/ 50</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h5>Pagos Puntuales</h5>
                    <h2>0 / 3</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="text-center mt-5">
        <a href="/evaluacion" class="btn btn-success btn-lg">
            Iniciar Evaluación
        </a>
    </div>

</div>

</body>
</html>
